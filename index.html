<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4n14ck - Open Source Projects</title>
    <meta name="description" content="Open source projects by M4n14ck - Rust and other tools">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fondo con efecto de gradiente -->
    <div class="background-gradient">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <header>
        <nav>
            <div class="nav-container">
                <a href="#" class="logo">m4n14ck</a>
                <ul class="nav-links">
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="https://github.com/m4n14ck" target="_blank">GitHub</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <!-- Hero Section con el título principal -->
        <section class="hero">
            <h1>M4N14CK</h1>
            <p class="subtitle">Open Source Developer & Security Researcher</p>
            <div class="hero-tags">
                <span>🦀 Rust</span>
                <span>🔒 Security</span>
                <span>⚡ Performance</span>
            </div>
        </section>

        <section id="projects">
            <div class="section-header">
                <h2>Featured Projects</h2>
                <p>Una selección de mis herramientas y frameworks.</p>
            </div>

            <div class="category">
                <h3>🦀 Rust Projects</h3>
                <div class="projects-grid" id="rust-projects"></div>
            </div>

            <div class="category">
                <h3>💻 Other Projects</h3>
                <div class="projects-grid" id="other-projects"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 <span>m4n14ck</span>. Hecho con ❤️ y mucho Rust</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
